# ==================================================================================================
# GENERAL SETTINGS
# ==================================================================================================

# Package type. Must be plugin4 for plugins.
type: plugin4

# Name that identifies the plugin.
name: MacroClaude

# Plugin name that is shown to the user.
displayName: macro-claude

# Short description of the plugin.
description: |
    Show the live state of running Claude Code sessions on Logi MX Creative
    Console keys. Each key displays one session: idle, working, thinking,
    stuck, or error, with elapsed turn time. Pressing a key focuses the
    terminal that owns the session.

# Name of the plugin library file.
pluginFileName: MacroClaudePlugin.dll

# Plugin version.
version: 1.0

# Author of the plugin. The author can be a company or an individual developer.
author: Aleksei Sviridkin

# Copyright information.
copyright: Copyright © 2026 Aleksei Sviridkin. MIT licensed.


# ==================================================================================================
# PLUGIN PROPERTIES
# ==================================================================================================

# Location of plugin files on Windows (relative to the plugin base directory).
# This parameter is required to support Windows.
#pluginFolderWin: bin

# Location of plugin files on macOS (relative to the plugin base directory).
# This parameter is required to support Mac.
pluginFolderMac: bin

# List of devices the plugin is optimized for.
supportedDevices:
    # LoupedeckCtFamily covers: Loupedeck CT, Live and Live S, Razer Stream
    # Controller, Razer Stream Controller X, and Logi MX Creative Console.
    - LoupedeckCtFamily

# List of plugin capabilities. macro-claude is a universal plugin that does
# not bind to any specific host application, so both HasApplication and
# ActivatesApplication stay disabled.
pluginCapabilities: []

# Minimum Loupedeck version supported by the plugin.
minimumLoupedeckVersion: 6.0


# ==================================================================================================
# LOUPEDECK MARKETPLACE SETTINGS
# ==================================================================================================

# Name of the license that the plugin is licensed under. Select the one that
# you prefer. NOTE: GPL is not compatible with Loupedeck Marketplace.
license: MIT

# URL of the plugin license.
licenseUrl: https://opensource.org/licenses/MIT

# URL of the support page where users can send improvement suggestions and
# report bugs. Shown in Loupedeck Marketplace.
supportPageUrl: https://github.com/lexfrei/macro-claude/issues

# URL of the plugin homepage. Shown in Loupedeck Marketplace.
homePageUrl: https://github.com/lexfrei/macro-claude
