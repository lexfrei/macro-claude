name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch to avoid piling up while
# pushing rapid fixups.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # shellcheck — strict mode across every bash hook we ship.
  # ----------------------------------------------------------------
  shellcheck:
    name: shellcheck hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Run shellcheck (strict)
        run: |
          shellcheck --severity=style --shell=bash --external-sources --enable=all \
            hooks/session-monitor.sh \
            hooks/install.sh

  # ----------------------------------------------------------------
  # .NET — only the test project is compiled here because the plugin
  # csproj references PluginApi.dll from a macOS-only Logi Plugin
  # Service install. The test project consumes the pure-logic sources
  # via <Compile Include Link="..."> and has zero Loupedeck deps, so
  # it runs happily on ubuntu.
  # ----------------------------------------------------------------
  dotnet-tests:
    name: dotnet test (pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore test project
        run: dotnet restore plugin/MacroClaudePlugin.Tests/MacroClaudePlugin.Tests.csproj

      - name: Build and run tests (xunit v3 native runner)
        run: dotnet run --project plugin/MacroClaudePlugin.Tests/MacroClaudePlugin.Tests.csproj --configuration Release

  # ----------------------------------------------------------------
  # VS Code companion extension — typecheck, lint, compile, and
  # validate that `vsce package` produces a VSIX.
  # ----------------------------------------------------------------
  vscode-extension:
    name: vscode-extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - run: npm ci

      - name: tsc --noEmit
        run: npm run typecheck

      - name: eslint (strict-type-checked)
        run: npm run lint

      - name: esbuild compile
        run: npm run compile

      - name: vsce package (sanity check)
        # npm run package runs the prepackage/postpackage hooks that
        # stage ../LICENSE into the extension directory for vsce.
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension-vsix
          path: vscode-extension/macro-claude-bridge-*.vsix
          if-no-files-found: error
