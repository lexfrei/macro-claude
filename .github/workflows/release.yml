name: Release

# Triggered by pushing a tag that matches v*, e.g. v1.0.0.
# Builds the VS Code companion extension VSIX, attaches release notes,
# and creates a GitHub release with the VSIX.
#
# The C# plugin's .lplug4 package is NOT built by CI because the plugin
# csproj references PluginApi.dll from a macOS-only Logi Plugin Service
# installation. Build it locally with:
#
#   make release-plugin
#
# and attach the resulting dist/MacroClaudePlugin.lplug4 to the release
# manually via `gh release upload`. See CLAUDE.md for details.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # Re-run the full CI pipeline as a release gate. We do not trust
  # that the tag was pushed from a green commit.
  # ----------------------------------------------------------------
  validate:
    name: Validate (CI gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: shellcheck
        run: |
          shellcheck --severity=style --shell=bash --external-sources --enable=all \
            hooks/session-monitor.sh hooks/install.sh

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: dotnet test (xunit v3 native runner)
        run: dotnet run --project plugin/MacroClaudePlugin.Tests/MacroClaudePlugin.Tests.csproj --configuration Release

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: vscode-extension typecheck + lint
        working-directory: vscode-extension
        run: |
          npm ci
          npm run typecheck
          npm run lint

  # ----------------------------------------------------------------
  # Build the VSIX artifact.
  # ----------------------------------------------------------------
  build-vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    needs: [validate]
    outputs:
      vsix-name: ${{ steps.pack.outputs.vsix-name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension deps
        working-directory: vscode-extension
        run: npm ci

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

      - name: Package VSIX
        id: pack
        working-directory: vscode-extension
        run: |
          # Use the npm `package` script so the prepackage hook copies
          # ../LICENSE into the extension directory and the postpackage
          # hook removes it afterwards. This keeps the VSIX license text
          # in sync with the root MIT LICENSE without committing a
          # duplicate file.
          npm run package
          VSIX=$(ls macro-claude-bridge-*.vsix | head -n 1)
          echo "vsix-name=${VSIX}" >> "$GITHUB_OUTPUT"
          ls -la "${VSIX}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: vscode-extension/macro-claude-bridge-*.vsix
          if-no-files-found: error

  # ----------------------------------------------------------------
  # Create the GitHub release and attach the VSIX.
  # ----------------------------------------------------------------
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-vsix]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: vsix
          path: dist/

      - name: Show artifacts
        run: ls -la dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -o errexit -o nounset -o pipefail

          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<'EOF'
          ## What is shipped in this release

          The GitHub Actions pipeline attaches the VS Code companion extension
          VSIX to every release. The macropad plugin `.lplug4` must be built
          locally on a macOS machine with Logi Plugin Service installed — see
          [CLAUDE.md](../CLAUDE.md) for details.

          ### Install

          ```sh
          # VS Code companion (attached below)
          code --install-extension macro-claude-bridge-VERSION.vsix

          # Macropad plugin (build locally)
          dotnet build plugin/MacroClaudePlugin/src/MacroClaudePlugin.csproj --configuration Release
          dotnet logiplugintool pack plugin/MacroClaudePlugin/bin/Release dist/MacroClaudePlugin.lplug4
          dotnet logiplugintool verify dist/MacroClaudePlugin.lplug4

          # Hooks
          bash hooks/install.sh
          ```
          EOF

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            dist/macro-claude-bridge-*.vsix
